<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пароль изменён</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(140deg, #dbeafe, #eef2ff 55%, #e0f2fe);
            color: #1f2937;
            padding: 16px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
            padding: 24px;
        }
        .muted { color: #6b7280; font-size: 14px; line-height: 1.5; }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 14px;
            padding: 10px;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Пароль изменён</h1>
    <p class="muted">Новый пароль сохранён. Логин остался прежним.</p>
    <a href="{% url 'journal' %}">Вернуться в журнал</a>
</div>
</body>
</html>
