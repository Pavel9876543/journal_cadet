name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: journal_test
          POSTGRES_USER: journal
          POSTGRES_PASSWORD: journal
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U journal -d journal_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: journal_test
      DB_USER: journal
      DB_PASSWORD: journal
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip check

      - name: Lint
        run: ruff check .

      - name: Migration consistency
        run: python manage.py makemigrations --check --dry-run

      - name: Django check
        run: python manage.py check

      - name: Production security check
        env:
          DJANGO_ENV: production
          DEBUG: "0"
          SECRET_KEY: ci-only-production-check-secret-key-with-more-than-fifty-characters-2026
          ALLOWED_HOSTS: example.com
          CSRF_TRUSTED_ORIGINS: https://example.com
          SECURE_SSL_REDIRECT: "1"
          SESSION_COOKIE_SECURE: "1"
          CSRF_COOKIE_SECURE: "1"
          SECURE_HSTS_SECONDS: "31536000"
          SECURE_HSTS_INCLUDE_SUBDOMAINS: "1"
          SECURE_HSTS_PRELOAD: "1"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Static assets check
        run: python manage.py collectstatic --noinput --clear

      - name: Tests
        run: python manage.py test -v 2

  docker-build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          file: ./Dockerfile
          push: false
          tags: cadet-journal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Runtime image check
        run: |
          docker run --rm --entrypoint sh cadet-journal:ci -c 'test -w /app && test -w "$STATIC_ROOT" && test "$STATIC_ROOT" = /var/lib/cadet-journal/staticfiles'
          docker run --rm --entrypoint python cadet-journal:ci manage.py check
          docker run --rm --entrypoint python cadet-journal:ci manage.py collectstatic --noinput --clear

      - name: Production-like HTTP healthcheck
        run: |
          container_id="$(docker run -d \
            -e DJANGO_ENV=production \
            -e DEBUG=0 \
            -e SECRET_KEY=ci-only-container-secret-key-with-more-than-fifty-characters-2026 \
            -e ALLOWED_HOSTS=example.com \
            -e SECURE_SSL_REDIRECT=1 \
            -e USE_X_FORWARDED_PROTO=1 \
            -e DB_ENGINE=django.db.backends.sqlite3 \
            -e DB_NAME=/tmp/journal-smoke.sqlite3 \
            cadet-journal:ci)
          trap 'docker logs "$container_id" || true; docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          healthy=0
          for _ in $(seq 1 30); do
            if docker exec "$container_id" python /app/docker/healthcheck.py; then
              healthy=1
              break
            fi
            sleep 2
          done

          test "$healthy" -eq 1
