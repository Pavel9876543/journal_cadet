name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ vars.APP_DIR || '/opt/cadet_journal' }}"
            REPO_CLONE_URL="${{ vars.REPO_CLONE_URL || format('https://github.com/{0}.git', github.repository) }}"

            echo "=== Проверка прав пользователя ==="

            if [ "$(id -u)" -eq 0 ]; then
              SUDO=""
            else
              if ! command -v sudo >/dev/null 2>&1; then
                echo "Ошибка: пользователь не root и sudo не установлен."
                echo "Зайдите на сервер под root или установите sudo."
                exit 1
              fi

              if ! sudo -n true >/dev/null 2>&1; then
                echo "Ошибка: пользователю нужен sudo без интерактивного ввода пароля."
                echo "Решение: используйте SSH_USER=root или настройте NOPASSWD для deploy-пользователя."
                exit 1
              fi

              SUDO="sudo -n"
            fi

            echo "=== Установка базовых зависимостей ==="

            if command -v apt-get >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive

              $SUDO apt-get update -y
              $SUDO apt-get install -y \
                ca-certificates \
                curl \
                gnupg \
                git \
                lsb-release
            else
              echo "Ошибка: этот workflow сейчас поддерживает только Debian/Ubuntu серверы с apt-get."
              exit 1
            fi

            echo "=== Проверка и установка Docker ==="

            export DEBIAN_FRONTEND=noninteractive
            
            $SUDO install -m 0755 -d /etc/apt/keyrings
            
            if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
                $SUDO gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            
              $SUDO chmod a+r /etc/apt/keyrings/docker.gpg
            fi
            
            . /etc/os-release
            
            DOCKER_CODENAME="${UBUNTU_CODENAME:-${VERSION_CODENAME:-}}"
            
            if [ -z "$DOCKER_CODENAME" ]; then
              echo "Ошибка: не удалось определить codename Ubuntu."
              exit 1
            fi
            
            echo "Codename системы: $DOCKER_CODENAME"
            
            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu ${DOCKER_CODENAME} stable" | \
              $SUDO tee /etc/apt/sources.list.d/docker.list > /dev/null
            
            $SUDO apt-get update -y
            
            $SUDO apt-get install -y \
              docker-ce \
              docker-ce-cli \
              containerd.io \
              docker-buildx-plugin \
              docker-compose-plugin
            
            $SUDO systemctl enable docker
            $SUDO systemctl start docker
            
            echo "=== Версии Docker ==="
            
            if docker version >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            else
              DOCKER_CMD="$SUDO docker"
            fi
            
            $DOCKER_CMD --version
            $DOCKER_CMD compose version

            echo "=== Подготовка директории приложения ==="

            $SUDO mkdir -p "$APP_DIR"

            if [ ! -w "$APP_DIR" ]; then
              $SUDO chown -R "$USER":"$USER" "$APP_DIR"
            fi

            echo "=== Получение кода проекта ==="

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_CLONE_URL" "$APP_DIR"
            elif [ ! -w "$APP_DIR/.git" ]; then
              $SUDO chown -R "$USER":"$USER" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git config --global --add safe.directory "$APP_DIR"
            
            echo "=== Сброс локальных изменений на сервере ==="
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd
            
            echo "=== Код проекта обновлён ==="

            echo "=== Создание .env.prod ==="

            : > .env.prod

            printf '%s\n' \
              "DJANGO_ENV=production" \
              "DEBUG=0" \
              "SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" \
              "ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }}" \
              "CSRF_TRUSTED_ORIGINS=${{ secrets.DJANGO_CSRF_TRUSTED_ORIGINS }}" \
              "SECURE_SSL_REDIRECT=1" \
              "SESSION_COOKIE_SECURE=1" \
              "CSRF_COOKIE_SECURE=1" \
              "SECURE_HSTS_SECONDS=31536000" \
              "SECURE_HSTS_INCLUDE_SUBDOMAINS=1" \
              "SECURE_HSTS_PRELOAD=1" \
              "USE_X_FORWARDED_PROTO=1" \
              "DB_ENGINE=django.db.backends.postgresql" \
              "DB_NAME=${{ secrets.POSTGRES_DB }}" \
              "DB_USER=${{ secrets.POSTGRES_USER }}" \
              "DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              "DB_HOST=db" \
              "DB_PORT=5432" \
              "WAIT_FOR_DB=1" \
              "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" \
              "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              "DJANGO_SUPERUSER_USERNAME=${{ secrets.DJANGO_SUPERUSER_USERNAME }}" \
              "DJANGO_SUPERUSER_EMAIL=${{ secrets.DJANGO_SUPERUSER_EMAIL }}" \
              "DJANGO_SUPERUSER_PASSWORD=${{ secrets.DJANGO_SUPERUSER_PASSWORD }}" \
              "DJANGO_SUPERUSER_ROTATE_PASSWORD=${{ secrets.DJANGO_SUPERUSER_ROTATE_PASSWORD }}" \
              "APP_IMAGE=cadet-journal:web" >> .env.prod

            chmod 600 .env.prod

            echo "=== Запуск production-стека ==="

            chmod +x ./scripts/run-prod.sh
            ./scripts/run-prod.sh

            echo "=== Очистка старых Docker-образов ==="

            $DOCKER_CMD image prune -f || true

            echo "=== Деплой завершён успешно ==="
