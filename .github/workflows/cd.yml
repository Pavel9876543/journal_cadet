name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/cadet_journal
            git fetch origin
            git reset --hard origin/main
            /opt/cadet_journal/.venv/bin/pip install -r requirements.txt
            /opt/cadet_journal/.venv/bin/python manage.py migrate
            /opt/cadet_journal/.venv/bin/python manage.py collectstatic --noinput
            systemctl restart cadet-journal
            systemctl reload nginx
